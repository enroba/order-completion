<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Search</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f9fafb;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px 15px 40px;
    }
    .top-center-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgb(0 0 0 / 0.1);
      padding: 30px 40px 40px;
      max-width: 760px;
      width: 100%;
      text-align: center;
    }
    h2 { margin-bottom: 24px; font-weight: 700; color: #222; }
    #inputsRow {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 20px 40px;
      margin-bottom: 28px;
    }
    label { font-weight: 600; color: #555; white-space: nowrap; user-select: none; }
    input[type="text"], input[type="number"] {
      padding: 10px 14px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      width: 280px;
      max-width: 100%;
      transition: border-color 0.3s ease;
      outline-offset: 2px;
      outline-color: transparent;
    }
    input[type="number"] { width: 90px; text-align: right; }
    input:focus { border-color: #007bff; outline-color: #007bff; box-shadow: 0 0 8px rgba(0,123,255,0.3); }
    #searchRow { margin-bottom: 32px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    #productInput { flex: 1; min-width: 280px; max-width: 400px; border: 2px solid #ddd; border-radius: 8px; padding: 12px 16px; font-size: 17px; }
    button {
      background-color: #007bff; color: #fff; border: none; font-weight: 600;
      padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer;
    }
    button:hover { background-color: #0056b3; }
    #productResult {
      display: none;
      margin-top: 20px;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
      gap: 30px;
      display: flex;
      justify-content: center;
      flex-wrap: nowrap;
      overflow-x: auto;
    }
    .product-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 3px 12px rgb(0 0 0 / 0.07);
      width: 320px;
      flex-shrink: 0;
    }
    .product-card h4 { margin-bottom: 14px; color: #007bff; }
    .variant-item { margin: 8px 0; }
    .out-of-stock { color: red; font-weight: 600; }
  </style>
</head>

<body>
  <div class="top-center-container">
    <h2>Search Product</h2>

    <div id="inputsRow">
      <label>Base URL:</label>
      <input type="text" id="baseUrlInput" value="https://zarposhcollection.com/products/" />

      <label>% Markup:</label>
      <input type="number" id="markupInput" value="18" />
    </div>

    <div id="searchRow">
      <input type="text" id="productInput" placeholder="Enter product handle" />
      <button id="searchBtn">Search</button>
    </div>

    <div id="productResult">
      <div id="originalPrices" class="product-card"></div>
      <div id="markedUpPrices" class="product-card"></div>
    </div>
  </div>

<script>
const searchBtn = document.getElementById('searchBtn');
const productResult = document.getElementById('productResult');
const inputField = document.getElementById('productInput');
const baseUrlInput = document.getElementById('baseUrlInput');
const markupInput = document.getElementById('markupInput');

let exchangeRate = 76; // fallback

async function fetchRate() {
  try {
    const res = await fetch("https://api.exchangerate-api.com/v4/latest/AED");
    const data = await res.json();
    exchangeRate = data.rates.PKR;
  } catch {
    console.log("Rate API failed, using fallback");
  }
}

function convert(aed) {
  return aed * exchangeRate;
}

function formatPrice(num) {
  return num.toLocaleString('en-US', { minimumFractionDigits: 2 });
}

function fixImageUrl(url) {
  if (!url) return null;
  if (url.startsWith('//')) return 'https:' + url;
  return url;
}

async function fetchProduct() {
  await fetchRate();

  let baseUrl = baseUrlInput.value.trim();
  if (!baseUrl.endsWith('/')) baseUrl += '/';

  let input = inputField.value.trim();
  const handle = input.replace(/\s+/g, '-').toLowerCase();
  const apiUrl = `${baseUrl}${handle}.js`;

  productResult.style.display = 'flex';

  try {
    const res = await fetch(apiUrl);
    if (!res.ok) throw new Error('Product not found');

    const product = await res.json();
    const markupPercent = parseFloat(markupInput.value);

    let productImage = product.image ? fixImageUrl(product.image) : null;

    let originalList = '';
    if (productImage) {
      originalList += `<img src="${productImage}" style="width:150px;border-radius:12px;">`;
    }

    originalList += '<h4>Original Prices (PKR)</h4>';

    product.variants.forEach(v => {
      const pricePKR = convert(v.price / 100);
      const stock = v.available ? 'In Stock' : '<span class="out-of-stock">Out of Stock</span>';

      originalList += `<div class="variant-item">${v.title} - PKR ${formatPrice(pricePKR)} — ${stock}</div>`;
    });

    let markedUpList = '';
    if (productImage) {
      markedUpList += `<img src="${productImage}" style="width:150px;border-radius:12px;">`;
    }

    markedUpList += `<h4>With ${markupPercent}% Profit (PKR)</h4>`;

    product.variants.forEach(v => {
      const base = v.price / 100;
      const marked = base / (1 - markupPercent / 100);
      const pricePKR = convert(marked);

      markedUpList += `<div class="variant-item">${v.title} - PKR ${formatPrice(pricePKR)}</div>`;
    });

    document.getElementById('originalPrices').innerHTML =
      originalList + `<a href="${baseUrl}${handle}" target="_blank">View on Website</a>`;

    document.getElementById('markedUpPrices').innerHTML = markedUpList;

  } catch (err) {
    document.getElementById('originalPrices').innerHTML = err.message;
  }
}

searchBtn.addEventListener('click', fetchProduct);
inputField.addEventListener('keypress', e => { if (e.key === 'Enter') fetchProduct(); });
</script>
</body>
</html>
